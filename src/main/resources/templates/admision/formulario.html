<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{compartido/layout :: master('Registro de Admisión', ~{::section})}">

    <section>

        <style>
            .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .form-group { margin-bottom: 15px; }
            label { display: block; font-weight: bold; margin-bottom: 5px; }
            input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; transition: all 0.3s ease; }
            input:focus, select:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
            .error { color: red; font-size: 0.9em; margin-top: 5px; display: block; }
            .btn { background-color: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; transition: background 0.3s; }
            .btn:hover { background-color: #1a252f; }
            .btn:disabled { background-color: #7f8c8d; cursor: not-allowed; opacity: 0.7; }
            .alert-success { background-color: #d4edda; color: #155724; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
            
            /* Estilos de integración con RENIEC y EsSalud */
            .dni-input-container { display: flex; gap: 10px; }
            .btn-buscar { background-color: #3498db; width: auto; font-size: 14px; padding: 10px 15px; margin: 0; white-space: nowrap; }
            .btn-buscar:hover { background-color: #2980b9; }
            .btn-buscar:disabled { background-color: #bdc3c7; cursor: not-allowed; }
            .dni-feedback { display: block; margin-top: 5px; font-size: 0.85em; font-weight: bold; }
            .dni-feedback.loading { color: #3498db; }
            .dni-feedback.success { color: #27ae60; }
            .dni-feedback.error { color: #c0392b; }
            
            @keyframes highlight-fade {
                0% { background-color: #e8f8f5; border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.5); }
                100% { background-color: white; border-color: #ccc; box-shadow: none; }
            }
            .autocompleted-highlight {
                animation: highlight-fade 2s ease-out;
            }
        </style>

        <div class="container">
            <h2>Registro de Nuevo Paciente</h2>

            <div th:if="${param.exito}" class="alert-success">
                ¡El paciente ha sido registrado exitosamente en el sistema!
            </div>

            <form th:action="@{/admision/registro}" th:object="${paciente}" method="post">

                <div class="form-group">
                    <label for="numeroDni">Número de DNI:</label>
                    <div class="dni-input-container">
                        <input type="text" id="numeroDni" th:field="*{numeroDni}" placeholder="Ej: 12345678" maxlength="8">
                        <button type="button" id="btnBuscarDni" class="btn btn-buscar">Buscar DNI</button>
                    </div>
                    <span id="dniFeedback" class="dni-feedback"></span>
                    <span class="error" th:if="${#fields.hasErrors('numeroDni')}" th:errors="*{numeroDni}"></span>
                </div>

                <div class="form-group">
                    <label for="nombres">Nombres:</label>
                    <input type="text" id="nombres" th:field="*{nombres}">
                </div>

                <div class="form-group">
                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" th:field="*{apellidos}">
                </div>

                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="text" id="telefono" th:field="*{telefono}" placeholder="Ej: 987654321">
                    <span class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></span>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" th:field="*{correo}" placeholder="Ej: paciente@correo.com">
                    <span class="error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>
                </div>

                <div class="form-group" style="display: none;">
                    <label for="seguroMedico">Seguro Médico Validado:</label>
                    <select id="seguroMedico" th:field="*{seguroMedico}">
                        <option value="">-- Seleccione el seguro --</option>
                        <option th:each="seguro : ${seguros}"
                                th:value="${seguro.idSeguroMedico}"
                                th:text="${seguro.estadoCobertura + ' - ' + seguro.tipoSeguro}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="essaludEstado">Estado:</label>
                    <input type="text" id="essaludEstado" placeholder="Pendiente de consulta..." readonly style="background-color: #f8f9fa;">
                </div>

                <div class="form-group">
                    <label for="essaludTipoSeguro">Tipo de Seguro Médico:</label>
                    <input type="text" id="essaludTipoSeguro" placeholder="Pendiente de consulta..." readonly style="background-color: #f8f9fa;">
                </div>

                <button type="submit" id="btnRegistrar" class="btn">Registrar Paciente</button>
            </form>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const dniInput = document.getElementById('numeroDni');
                const btnBuscar = document.getElementById('btnBuscarDni');
                const feedback = document.getElementById('dniFeedback');
                
                const inputNombres = document.getElementById('nombres');
                const inputApellidos = document.getElementById('apellidos');
                const inputFechaNacimiento = document.getElementById('fechaNacimiento');
                const selectSeguro = document.getElementById('seguroMedico');
                const inputEssaludEstado = document.getElementById('essaludEstado');
                const inputEssaludTipoSeguro = document.getElementById('essaludTipoSeguro');
                const btnRegistrar = document.getElementById('btnRegistrar');

                function buscarDni() {
                    const dni = dniInput.value.trim();
                    
                    if (!/^\d{8}$/.test(dni)) {
                        feedback.textContent = "El DNI debe tener exactamente 8 dígitos numéricos.";
                        feedback.className = "dni-feedback error";
                        btnRegistrar.disabled = true;
                        return;
                    }

                    feedback.textContent = "Consultando RENIEC y EsSalud...";
                    feedback.className = "dni-feedback loading";
                    btnBuscar.disabled = true;
                    dniInput.disabled = true;
                    btnRegistrar.disabled = true;

                    // Promesas paralelas para RENIEC y EsSalud
                    const fetchReniec = fetch(`/api/reniec/${dni}`).then(res => {
                        if (res.status === 200) return res.json();
                        if (res.status === 404) throw new Error("DNI no registrado en el padrón de RENIEC.");
                        throw new Error("Error al conectar con la API de RENIEC.");
                    });

                    const fetchEsSalud = fetch(`/api/essalud/${dni}`).then(res => {
                        if (res.status === 200) return res.json();
                        if (res.status === 404) throw new Error("El paciente no está registrado en el padrón de EsSalud.");
                        throw new Error("Error al conectar con la API de EsSalud.");
                    });

                    Promise.all([fetchReniec, fetchEsSalud])
                        .then(([dataReniec, dataEssalud]) => {
                            // Validar que la afiliación con EsSalud sea activa (comparación insensible a mayúsculas/minúsculas)
                            if (!dataEssalud.estado || dataEssalud.estado.toUpperCase() !== "ACTIVO") {
                                throw new Error(`Afiliación inactiva en EsSalud (Estado: ${dataEssalud.estado || 'No definido'}). No se permite el registro.`);
                            }

                            // Validar que el tipo de seguro esté admitido en el programa
                            const segurosPermitidos = [
                                "seguro regular (+seguro)",
                                "seguro potestativo (+salud)",
                                "seguro agrario",
                                "sctr (+protección)",
                                "seguro +vida"
                            ];

                            if (!dataEssalud.tipoSeguro || !segurosPermitidos.includes(dataEssalud.tipoSeguro.toLowerCase())) {
                                throw new Error(`El seguro de EsSalud "${dataEssalud.tipoSeguro || 'No definido'}" no está admitido en el programa.`);
                            }

                            // Rellenar datos personales (RENIEC)
                            inputNombres.value = dataReniec.nombres;
                            inputApellidos.value = `${dataReniec.apellidoPaterno} ${dataReniec.apellidoMaterno}`;
                            inputFechaNacimiento.value = dataReniec.fechaNacimiento;

                            // Rellenar datos de la afiliación (EsSalud)
                            inputEssaludEstado.value = dataEssalud.estado;
                            inputEssaludTipoSeguro.value = dataEssalud.tipoSeguro;

                            // Autoseleccionar Seguro Médico en el select
                            let seguroEncontrado = false;
                            for (let i = 0; i < selectSeguro.options.length; i++) {
                                const option = selectSeguro.options[i];
                                if (option.text.toLowerCase().includes(dataEssalud.tipoSeguro.toLowerCase())) {
                                    selectSeguro.selectedIndex = i;
                                    seguroEncontrado = true;
                                    break;
                                }
                            }

                            if (!seguroEncontrado) {
                                throw new Error(`El seguro de EsSalud "${dataEssalud.tipoSeguro}" no coincide con las opciones del sistema.`);
                            }

                             feedback.textContent = "El DNI se ha verificado correctamente con RENIEC y cuenta con un tipo de seguro activo.";
                             feedback.className = "dni-feedback success";
                            btnRegistrar.disabled = false; // Permitir continuar

                            // Animar destello de campos autocompletados
                            [inputNombres, inputApellidos, inputFechaNacimiento, selectSeguro, inputEssaludEstado, inputEssaludTipoSeguro].forEach(input => {
                                input.classList.remove('autocompleted-highlight');
                                void input.offsetWidth; // Reflow
                                input.classList.add('autocompleted-highlight');
                            });
                        })
                        .catch(error => {
                            feedback.textContent = error.message;
                            feedback.className = "dni-feedback error";
                            btnRegistrar.disabled = true; // Bloquear registro
                            
                            // Limpiar campos para evitar datos huérfanos/inconsistentes
                            inputNombres.value = "";
                            inputApellidos.value = "";
                            inputFechaNacimiento.value = "";
                            selectSeguro.value = "";
                            inputEssaludEstado.value = "";
                            inputEssaludTipoSeguro.value = "";
                        })
                        .finally(() => {
                            btnBuscar.disabled = false;
                            dniInput.disabled = false;
                        });
                }

                btnBuscar.addEventListener('click', buscarDni);

                dniInput.addEventListener('input', function() {
                    if (dniInput.value.trim().length === 8) {
                        buscarDni();
                    } else {
                        feedback.textContent = "";
                        feedback.className = "dni-feedback";
                        btnRegistrar.disabled = true;
                    }
                });

                // Inicializar deshabilitado si el DNI está vacío
                if (dniInput.value.trim().length === 8) {
                    buscarDni();
                } else {
                    btnRegistrar.disabled = true;
                }
            });
        </script>
    </section>
</th:block>
</html>
