<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{compartido/layout :: master('Registro de Admisión', ~{::section})}">

    <section>

        <style>
            .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .form-group { margin-bottom: 15px; }
            label { display: block; font-weight: bold; margin-bottom: 5px; }
            input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
            .error { color: red; font-size: 0.9em; margin-top: 5px; display: block; }
            .btn { background-color: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
            .btn:hover { background-color: #1a252f; }
            .alert-success { background-color: #d4edda; color: #155724; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        </style>

        <div class="container">
            <h2>Registro de Nuevo Paciente</h2>

            <div th:if="${param.exito}" class="alert-success">
                ¡El paciente ha sido registrado exitosamente en el sistema!
            </div>

            <form th:action="@{/admision/registro}" th:object="${paciente}" method="post">

                <div class="form-group">
                    <label for="numeroDni">Número de DNI:</label>
                    <input type="text" id="numeroDni" th:field="*{numeroDni}" placeholder="Ej: 12345678">
                    <span class="error" th:if="${#fields.hasErrors('numeroDni')}" th:errors="*{numeroDni}"></span>
                </div>

                <div class="form-group">
                    <label for="nombres">Nombres:</label>
                    <input type="text" id="nombres" th:field="*{nombres}">
                </div>

                <div class="form-group">
                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" th:field="*{apellidos}">
                </div>

                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                    <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}">
                </div>

                <div class="form-group">
                    <label for="seguroMedico">Seguro Médico Validado:</label>
                    <select id="seguroMedico" th:field="*{seguroMedico}">
                        <option value="">-- Seleccione el seguro --</option>
                        <option th:each="seguro : ${seguros}"
                                th:value="${seguro.idSeguroMedico}"
                                th:text="${seguro.estadoCobertura + ' - ' + seguro.tipoSeguro}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn">Registrar Paciente</button>
            </form>
        </div>

    </section>
</th:block>
</html>
