<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{compartido/layout :: master('Historial de Citas', ~{::section})}">

  <section>

    <style>
      .container { background-color: white; padding: 30px; border-radius: 8px; max-width: 900px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      table { width: 100%; border-collapse: collapse; margin-top: 20px; }
      th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
      th { background-color: #2c3e50; color: white; }
      .btn { background-color: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
      .btn:hover { background-color: #c0392b; }
      .btn-nueva { background-color: #2980b9; color: white; padding: 10px 20px; border: none; border-radius: 4px; text-decoration: none; font-size: 14px; display: inline-block; margin-top: 20px; }
    </style>

    <div class="container">
      <h2>Historial de Citas</h2>

      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Médico</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cita : ${citas}">
          <td th:text="${cita.idCitaMedica}"></td>
          <td th:text="${cita.disponibilidadMedica.medico.nombreCompleto}"></td>
          <td th:text="${cita.disponibilidadMedica.fechaTurno}"></td>
          <td th:text="${cita.disponibilidadMedica.horaInicio}"></td>
          <td th:text="${cita.estadoCita}"></td>
          <td>
            <form th:if="${cita.estadoCita == 'Pendiente'}"
                  th:action="@{/citas/cancelar}"
                  method="post">
              <input type="hidden" name="idCita" th:value="${cita.idCitaMedica}"/>
              <button class="btn">Cancelar</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(citas)}">
          <td colspan="6" style="text-align: center; color: #7f8c8d;">No hay citas registradas.</td>
        </tr>
        </tbody>
      </table>

      <a href="/citas/reservar" class="btn-nueva">Nueva Cita</a>
    </div>

  </section>
</th:block>
</html>
