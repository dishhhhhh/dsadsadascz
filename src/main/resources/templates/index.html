<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{compartido/layout :: master('Inicio', ~{::section})}">

    <section>
        <style>
            .welcome { background-color: white; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .cards { display: flex; gap: 20px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
            .card { background-color: #2c3e50; color: white; padding: 30px 40px; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: bold; transition: background 0.3s; }
            .card:hover { background-color: #1a252f; }
        </style>

        <div class="welcome">
            <h1>🏥 Sistema de Gestión Clínica</h1>
            <p>Seleccione el módulo al que desea acceder:</p>
            <div class="cards">
                <a th:href="@{/admision/registro}" class="card">1. Admisión</a>
                <a th:href="@{/citas/reservar}" class="card">2. Agendar Cita</a>
                <a th:href="@{/triaje/cola}" class="card">3. Triaje</a>
            </div>
        </div>
    </section>
</th:block>
</html>
