<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{compartido/layout :: master('Cola de Triaje', ~{::section})}">

    <section>

        <style>
            .container { background-color: white; padding: 30px; border-radius: 8px; max-width: 800px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
            th { background-color: #2c3e50; color: white; }
            .btn { background-color: #e67e22; color: white; padding: 8px 15px; border: none; border-radius: 4px; text-decoration: none; font-size: 14px; }
            .btn:hover { background-color: #d35400; }
            .alert-success { background-color: #d4edda; color: #155724; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        </style>

        <div class="container">
            <h2>Pacientes en Espera (Triaje)</h2>

            <div th:if="${param.exito}" class="alert-success">
                ¡Triaje registrado correctamente! El paciente está listo para su consulta médica.
            </div>

            <table>
                <thead>
                <tr>
                    <th>Hora</th>
                    <th>Paciente</th>
                    <th>DNI</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cita : ${citasPendientes}">
                    <td th:text="${cita.disponibilidadMedica.horaInicio}"></td>
                    <td th:text="${cita.paciente.nombres + ' ' + cita.paciente.apellidos}"></td>
                    <td th:text="${cita.paciente.numeroDni}"></td>
                    <td>
                        <a class="btn" th:href="@{/triaje/registrar(idCita=${cita.idCitaMedica})}">Tomar Signos</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(citasPendientes)}">
                    <td colspan="4" style="text-align: center; color: #7f8c8d;">No hay pacientes en cola en este momento.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </section>
</th:block>
</html>
