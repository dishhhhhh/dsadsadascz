<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{compartido/layout :: master('Registro de Signos Vitales', ~{::section})}">

    <section>

        <style>
            .container { background-color: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .info-card { background-color: #e8f4f8; padding: 15px; border-left: 4px solid #2980b9; border-radius: 4px; margin-bottom: 20px; }
            .form-group { margin-bottom: 15px; }
            label { display: block; font-weight: bold; margin-bottom: 5px; }
            input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
            .btn { background-color: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px;}
            .btn:hover { background-color: #219150; }
            .alert-error { background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        </style>

        <div class="container">
            <h2>Registro de Triaje</h2>

            <div th:if="${param.error}" class="alert-error" th:text="${param.error}"></div>

            <div class="info-card" th:if="${citaInfo != null}">
                <strong>Paciente:</strong> <span th:text="${citaInfo.paciente.nombres + ' ' + citaInfo.paciente.apellidos}"></span><br>
                <strong>Alergias Conocidas:</strong> <span style="color: red; font-weight: bold;" th:text="${historiaInfo != null ? historiaInfo.alergias : 'No registradas'}"></span><br>
                <strong>Tipo de Sangre:</strong> <span th:text="${historiaInfo != null ? historiaInfo.tipoSangre : 'Desconocido'}"></span>
            </div>

            <form th:action="@{/triaje/registrar}" method="post" th:object="${registroTriaje}">

                <input type="hidden" name="idCita" th:value="${citaInfo.idCitaMedica}">

                <div class="form-group">
                    <label for="motivoConsulta">Motivo Principal de Consulta:</label>
                    <input type="text" id="motivoConsulta" th:field="*{motivoConsulta}" placeholder="Ej: Dolor de cabeza intenso" required>
                </div>

                <div class="form-group" style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label for="presionArterial">Presión Arterial:</label>
                        <input type="text" id="presionArterial" th:field="*{presionArterial}" placeholder="Ej: 120/80" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="saturacionOxigeno">Saturación O2 (%):</label>
                        <input type="number" id="saturacionOxigeno" th:field="*{saturacionOxigeno}" placeholder="Ej: 98" required>
                    </div>
                </div>

                <div class="form-group" style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label for="temperatura">Temperatura (°C):</label>
                        <input type="number" step="0.1" id="temperatura" th:field="*{temperatura}" placeholder="Ej: 37.5" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="peso">Peso (kg):</label>
                        <input type="number" step="0.1" id="peso" th:field="*{peso}" placeholder="Ej: 70.5" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="talla">Talla (m):</label>
                        <input type="number" step="0.01" id="talla" th:field="*{talla}" placeholder="Ej: 1.75" required>
                    </div>
                </div>

                <button type="submit" class="btn">Guardar Triaje y Habilitar Atención</button>
            </form>
        </div>

    </section>
</th:block>
</html>
