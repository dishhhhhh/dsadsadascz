# Nombre del proyecto
spring.application.name=is2.grupo3

# Servidor de la aplicación web (correrá en http://localhost:8080)
server.port=${PORT:8080}

# Configuración de la conexión a tu PostgreSQL local
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
# 'update' creará o modificará las tablas en Postgres automáticamente según tus clases @Entity de Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Configuración de Thymeleaf para desarrollo
# Desactiva la caché para que veas los cambios en tus HTML al recargar el navegador sin reiniciar el servidor
spring.thymeleaf.cache=false
