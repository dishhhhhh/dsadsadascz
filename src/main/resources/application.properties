# Servidor de la aplicación web (correrá en http://localhost:8080)
server.port=8080

# Configuración de la conexión a tu PostgreSQL local
spring.datasource.url=postgresql://postgres:LQYQzAptwVgyHSYDoLaWwGzukADlHLEO@postgres.railway.internal:5432/railway
spring.datasource.username=postgres
spring.datasource.password=LQYQzAptwVgyHSYDoLaWwGzukADlHLEO
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
# 'update' creará o modificará las tablas en Postgres automáticamente según tus clases @Entity de Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuración de Thymeleaf para desarrollo
# Desactiva la caché para que veas los cambios en tus HTML al recargar el navegador sin reiniciar el servidor
spring.thymeleaf.cache=false
