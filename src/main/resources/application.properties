# Nombre del proyecto
spring.application.name=is2.grupo3

# Servidor de la aplicación web (Tomcat leerá el puerto interno de Railway)
server.port=${PORT:8080}

# Conexión automática usando la URL Privada de Railway (Corregida para JDBC)
spring.datasource.url=jdbc:${DATABASE_PRIVATE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Desactivamos el timeout en 0 para que si falla, nos muestre el "Caused by" real en el log
spring.datasource.hikari.initialization-fail-timeout=10000

# Configuración de Thymeleaf para desarrollo
spring.thymeleaf.cache=false
